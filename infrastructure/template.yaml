AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Amazon EMR Spark Alert Reduction — DevOps Agent layer.
  Deploys Amazon S3 runbook store (HTTPS-only policy).
  Amazon Bedrock Knowledge Base (with managed vector store) is created
  post-deploy via the deploy script.

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:

  # S3 Bucket — runbooks + Spark event logs.
  # Hardened: BPA, SSE-S3 (AES-256), HTTPS-only bucket policy.
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-emr-spark-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: devopsagent
          Value: "true"

  # Enforce HTTPS (TLS) for all requests to DataBucket.
  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt DataBucket.Arn
              - !Sub "${DataBucket.Arn}/*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  # IAM Role for Amazon Bedrock Knowledge Base.
  # Grants Bedrock service read access to runbooks in S3 and model invocation.
  KBRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-kb-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:ListBucket]
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub "${DataBucket.Arn}/runbooks/*"
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v1"
        - PolicyName: AossAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: aoss:APIAccessAll
                # Scoped to this account's AOSS collections. The data access policy
                # (AossDataAccessPolicy) further restricts to the specific collection.
                Resource: !Sub "arn:aws:aoss:${AWS::Region}:${AWS::AccountId}:collection/*"
                Condition:
                  StringEquals:
                    aws:PrincipalAccount: !Ref "AWS::AccountId"

  # Amazon OpenSearch Serverless — vector store for the Bedrock Knowledge Base.
  AossEncryptionPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${EnvironmentName}-emr-kb-enc"
      Type: encryption
      Policy: !Sub '{"Rules":[{"ResourceType":"collection","Resource":["collection/${EnvironmentName}-emr-kb"]}],"AWSOwnedKey":true}'

  # Network policy — DEPLOY-TIME state:
  #   collection + dashboard: public, so the deploy script's awscurl can create
  #   the vector index (index API uses the collection data-plane endpoint).
  #   Bedrock service access is also granted for runtime queries.
  # After index creation, deploy-infra.sh flips this to AllowFromPublic:false
  # (Bedrock service access only) so there is no standing public access.
  AossNetworkPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${EnvironmentName}-emr-kb-net"
      Type: network
      Policy: !Sub '[{"Rules":[{"ResourceType":"collection","Resource":["collection/${EnvironmentName}-emr-kb"]},{"ResourceType":"dashboard","Resource":["collection/${EnvironmentName}-emr-kb"]}],"AllowFromPublic":true}]'

  AossDataAccessPolicy:
    Type: AWS::OpenSearchServerless::AccessPolicy
    Properties:
      Name: !Sub "${EnvironmentName}-emr-kb-access"
      Type: data
      Policy: !Sub
        - '[{"Rules":[{"ResourceType":"index","Resource":["index/${CollName}/*"],"Permission":["aoss:CreateIndex","aoss:DeleteIndex","aoss:UpdateIndex","aoss:DescribeIndex","aoss:ReadDocument","aoss:WriteDocument"]},{"ResourceType":"collection","Resource":["collection/${CollName}"],"Permission":["aoss:CreateCollectionItems","aoss:DeleteCollectionItems","aoss:DescribeCollectionItems","aoss:UpdateCollectionItems"]}],"Principal":["${KBRoleArn}","arn:aws:iam::${AccountId}:root"]}]'
        - CollName: !Sub "${EnvironmentName}-emr-kb"
          KBRoleArn: !GetAtt KBRole.Arn
          AccountId: !Ref "AWS::AccountId"

  AossCollection:
    Type: AWS::OpenSearchServerless::Collection
    DependsOn:
      - AossEncryptionPolicy
      - AossNetworkPolicy
      - AossDataAccessPolicy
    Properties:
      Name: !Sub "${EnvironmentName}-emr-kb"
      Type: VECTORSEARCH
      Description: Vector store for Amazon EMR runbook knowledge base

Outputs:
  DataBucketName:
    Value: !Ref DataBucket
  KBRoleArn:
    Value: !GetAtt KBRole.Arn
  AossCollectionArn:
    Value: !GetAtt AossCollection.Arn
