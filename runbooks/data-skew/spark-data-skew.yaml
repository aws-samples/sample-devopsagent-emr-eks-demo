scenario_name: spark-data-skew
description: >
  Investigation procedure for Spark job performance degradation or failures caused by
  uneven data distribution across partitions.
severity: NON_SEVERE
data_sources:
  shs: "Spark History Server MCP — stage metrics, task-level metrics, executor status, shuffle statistics"
  cloudwatch_logs: "CloudWatch log group /emr-on-eks/<env> — driver and executor application logs"
  eks: "Kubernetes pod status, resource usage in namespace emr-data-team-a"
  cloudwatch_metrics: "AWS/EMRContainers namespace — job duration, container counts"
investigation_steps:
  - step_number: 1
    action: "Identify the affected application"
    sources: ["shs"]
    shs_tool: "get_application_list"
    what_to_look_for: "Find the job by name or time window. Note application ID and whether it completed slowly or failed."
  - step_number: 2
    action: "Identify the slowest or failed stages"
    sources: ["shs"]
    shs_tool: "get_stage_list"
    what_to_look_for: "Stages with unusually long duration, or stages that failed. Note stage IDs."
  - step_number: 3
    action: "Examine stage-level metrics"
    sources: ["shs"]
    shs_tool: "get_stage_details"
    what_to_look_for: "shuffleReadBytes, shuffleWriteBytes, memoryBytesSpilled, diskBytesSpilled. High spill values indicate partitions exceeding available memory."
  - step_number: 4
    action: "Analyze task-level distribution for the slow stage"
    sources: ["shs"]
    shs_tool: "get_stage_task_list"
    what_to_look_for: "Compare max vs median for inputSize, duration, and shuffleReadBytes across tasks. A ratio of 10x+ between max and median confirms skew."
  - step_number: 5
    action: "Check executor metrics for uneven load"
    sources: ["shs"]
    shs_tool: "get_executor_list"
    what_to_look_for: "Are some executors showing significantly higher totalDuration or totalInputBytes than others?"
  - step_number: 6
    action: "Search logs for spill indicators"
    sources: ["cloudwatch_logs"]
    log_group: "/emr-on-eks/<env>"
    what_to_look_for: "Messages about ExternalAppendOnlyMap or ExternalSorter spilling to disk. Note which executor logged them."
  - step_number: 7
    action: "Check if AQE skew handling was active"
    sources: ["shs"]
    shs_tool: "get_application_environment"
    what_to_look_for: "spark.sql.adaptive.enabled, spark.sql.adaptive.skewJoin.enabled — if disabled, skew won't be auto-mitigated."
  - step_number: 8
    action: "Correlate findings"
    sources: ["shs", "cloudwatch_logs"]
    what_to_look_for: >
      Do the spill log entries correspond to the tasks with highest inputSize?
      Is the slow stage a shuffle-dependent stage (join or aggregation)?
      Determine what caused the uneven distribution.
platform_notes:
  - "EMR on EKS uses Spark's default hash partitioning. Null keys or high-cardinality hot keys concentrate in a single partition."
  - "AQE must be explicitly enabled. Without it, Spark cannot detect or mitigate skew at runtime."
  - "Spill to disk is not a failure — it's a degradation signal. The job may complete but much slower than expected."
  - "Task-level metrics from SHS are the primary signal for skew — log-based detection is secondary."
remediation:
  enable_aqe:
    - "Set spark.sql.adaptive.enabled=true"
    - "Set spark.sql.adaptive.skewJoin.enabled=true"
  increase_partitions:
    - "Increase spark.sql.shuffle.partitions to spread data more evenly"
  code_changes:
    - "Repartition on a more evenly distributed key before joins"
    - "Use broadcast join for the smaller side if one table is small enough"
tags:
  - data-skew
  - performance
  - shuffle
  - partitioning
  - straggler
