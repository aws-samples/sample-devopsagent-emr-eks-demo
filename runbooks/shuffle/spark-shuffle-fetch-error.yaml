scenario_name: spark-shuffle-fetch-error
description: >
  Investigation procedure for Spark stage failures caused by shuffle fetch errors.
  Occurs when reducer tasks cannot read shuffle output from mapper tasks.
severity: SEVERE
data_sources:
  shs: "Spark History Server MCP — stage attempts, shuffle metrics, executor lifecycle"
  cloudwatch_logs: "CloudWatch log group /emr-on-eks/<env> — FetchFailedException stack traces, executor logs"
  eks: "Kubernetes pod events, termination status, node conditions in namespace emr-data-team-a"
  cloudwatch_metrics: "AWS/EMRContainers namespace — job state transitions"
investigation_steps:
  - step_number: 1
    action: "Identify the failed application and stage"
    sources: ["shs"]
    shs_tool: "get_application_list"
    what_to_look_for: "Find the failed app. Note application ID."
  - step_number: 2
    action: "Identify which stage failed and how many attempts it made"
    sources: ["shs"]
    shs_tool: "get_stage_list"
    what_to_look_for: "Stages with multiple attempts or FAILED status. Multiple attempts suggest transient fetch failures."
  - step_number: 3
    action: "Examine shuffle metrics on the failed stage"
    sources: ["shs"]
    shs_tool: "get_stage_details"
    what_to_look_for: "shuffleReadBytes, shuffleWriteBytes, shuffleFetchWaitTime. Compare the failed stage attempt vs any successful prior stages."
  - step_number: 4
    action: "Check executor lifecycle"
    sources: ["shs"]
    shs_tool: "get_executor_list"
    what_to_look_for: "Were any executors removed between the shuffle write stage and the shuffle read stage? Note their removal time and reason."
  - step_number: 5
    action: "Search logs for fetch failure details"
    sources: ["cloudwatch_logs"]
    log_group: "/emr-on-eks/<env>"
    what_to_look_for: "FetchFailedException messages — note which executor was the source, what block was requested, and the connection error type."
  - step_number: 6
    action: "Check Kubernetes pod status for the source executor"
    sources: ["eks"]
    what_to_look_for: "Was the source executor pod terminated, evicted, or restarted between shuffle write and read? Check pod events and termination reason."
  - step_number: 7
    action: "Check for disk or network issues"
    sources: ["cloudwatch_logs", "eks"]
    what_to_look_for: "Messages about disk full, I/O errors, connection refused, or connection reset. Check if node-level issues affected multiple pods."
  - step_number: 8
    action: "Correlate findings"
    sources: ["shs", "cloudwatch_logs", "eks"]
    what_to_look_for: >
      Does the executor removal time match the fetch failure time?
      Was it a single executor or multiple? Single executor loss points to pod-level issue;
      multiple points to node-level or network issue.
platform_notes:
  - "EMR on EKS does not run an external shuffle service by default. Shuffle data lives on the executor pod — if the pod dies, shuffle data is lost."
  - "Karpenter may terminate nodes for consolidation. If the source executor was on a consolidated node, shuffle data is lost."
  - "Spark retries fetch failures up to spark.shuffle.io.maxRetries times. Check if retries were exhausted."
  - "Network policies in EKS can block executor-to-executor traffic on the shuffle service port."
remediation:
  executor_stability:
    - "Increase executor memory/resources to prevent OOM-induced pod termination"
    - "Configure pod disruption budgets to protect executor pods during node maintenance"
  retry_tuning:
    - "Increase spark.shuffle.io.maxRetries and spark.shuffle.io.retryWait"
    - "Increase spark.stage.maxConsecutiveAttempts for transient failures"
  infrastructure:
    - "Deploy external shuffle service to decouple shuffle data from executor lifecycle"
    - "Verify network policies allow traffic between executor pods"
    - "Increase local disk capacity for shuffle-heavy workloads"
tags:
  - shuffle
  - fetch-failure
  - network
  - disk
  - stage-failure
