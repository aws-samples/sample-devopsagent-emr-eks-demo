scenario_name: emr-job-submission-failure
description: >
  Investigation procedure for Amazon EMR on Amazon EKS job submission failures.
  The job fails to start or is immediately rejected before any Spark code runs.
severity: SEVERE
data_sources:
  cloudwatch_logs: "CloudWatch log group /emr-on-eks/<env> — submission error details if any logs were emitted"
  eks: "Kubernetes namespace status, service account, RBAC bindings in emr-data-team-a"
  cloudwatch_metrics: "AWS/EMRContainers namespace — job submission counts and failures"
  emr_api: "EMR on EKS DescribeJobRun API — failure reason and state history"
investigation_steps:
  - step_number: 1
    action: "Get the job run details and failure reason"
    sources: ["emr_api"]
    what_to_look_for: "Use DescribeJobRun to get the failureReason and stateDetails. Note if the job went directly from SUBMITTED to FAILED without RUNNING."
  - step_number: 2
    action: "Check if the failure is IAM-related"
    sources: ["emr_api"]
    what_to_look_for: "Does the failure reason mention AccessDenied, not authorized, or role cannot be assumed? If so, investigate the execution role."
  - step_number: 3
    action: "Check the EKS namespace and virtual cluster"
    sources: ["eks"]
    what_to_look_for: "Does the namespace exist? Is the EMR virtual cluster in RUNNING state? Are RBAC bindings present for the EMR service account?"
  - step_number: 4
    action: "Verify the job entrypoint is accessible"
    sources: ["cloudwatch_logs"]
    what_to_look_for: "S3 access denied or file-not-found errors for the entrypoint script path."
  - step_number: 5
    action: "Check for configuration errors"
    sources: ["emr_api"]
    what_to_look_for: "InvalidParameterException in the failure reason — unsupported Spark config, invalid release label, or malformed job parameters."
  - step_number: 6
    action: "Check service quotas"
    sources: ["cloudwatch_metrics"]
    what_to_look_for: "Are there many concurrent job runs? EMR on EKS has per-virtual-cluster concurrency limits."
  - step_number: 7
    action: "Correlate findings"
    sources: ["emr_api", "eks", "cloudwatch_logs"]
    what_to_look_for: >
      Determine the category of failure: IAM/permissions, configuration error,
      S3 access, namespace issue, or quota limit.
platform_notes:
  - "EMR on EKS execution role needs a trust policy for emr-containers.amazonaws.com AND the specific virtual cluster condition."
  - "The execution role needs S3 read access to the entrypoint script bucket AND path."
  - "Jobs that fail at submission never produce Spark event logs — SHS will have no data for these."
  - "CloudWatch log streams are only created if the driver pod actually started. Submission failures may have no logs at all."
remediation:
  iam_fix:
    - "Verify execution role trust policy includes emr-containers.amazonaws.com"
    - "Verify role has s3:GetObject on the entrypoint script path"
    - "Verify role has logs:CreateLogStream and logs:PutLogEvents for the configured log group"
  configuration_fix:
    - "Validate Spark configuration properties against the release label documentation"
    - "Verify the S3 entrypoint path exists and is a valid Python/Jar file"
  infrastructure_fix:
    - "Confirm virtual cluster is in RUNNING state"
    - "Verify namespace exists with correct EMR RBAC bindings"
    - "Request quota increase if concurrent limit is reached"
tags:
  - submission
  - iam
  - permissions
  - virtual-cluster
  - configuration
