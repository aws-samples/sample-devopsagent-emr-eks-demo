scenario_name: spark-performance-degradation
description: >
  Investigation procedure for Spark jobs that complete but take significantly longer
  than expected due to suboptimal execution.
severity: NON_SEVERE
data_sources:
  shs: "Spark History Server MCP — stage durations, task metrics, executor GC time, shuffle and spill statistics"
  cloudwatch_logs: "CloudWatch log group /emr-on-eks/<env> — GC logs, spill warnings"
  eks: "Kubernetes pod resource usage in namespace emr-data-team-a"
  cloudwatch_metrics: "AWS/EMRContainers namespace — job duration compared to historical"
investigation_steps:
  - step_number: 1
    action: "Identify the slow application"
    sources: ["shs"]
    shs_tool: "get_application_list"
    what_to_look_for: "Find the app by name or time window. Note total duration vs expected baseline."
  - step_number: 2
    action: "Identify the slowest stages"
    sources: ["shs"]
    shs_tool: "get_stage_list"
    what_to_look_for: "Which stages consumed the most time? Are there stages that took disproportionately long relative to their data volume?"
  - step_number: 3
    action: "Examine stage details for the slowest stage"
    sources: ["shs"]
    shs_tool: "get_stage_details"
    what_to_look_for: "shuffleReadBytes, shuffleWriteBytes, memoryBytesSpilled, diskBytesSpilled, executorRunTime, jvmGCTime. Compare GC time to total executor time — ratio above 20% indicates GC pressure."
  - step_number: 4
    action: "Analyze task distribution for straggler detection"
    sources: ["shs"]
    shs_tool: "get_stage_task_list"
    what_to_look_for: "Compare max vs median duration and inputSize. High variance indicates stragglers from skew or resource contention."
  - step_number: 5
    action: "Check executor-level GC and resource usage"
    sources: ["shs"]
    shs_tool: "get_executor_list"
    what_to_look_for: "totalGCTime vs totalDuration per executor. Are some executors spending much more time in GC?"
  - step_number: 6
    action: "Check Spark configuration"
    sources: ["shs"]
    shs_tool: "get_application_environment"
    what_to_look_for: "spark.sql.shuffle.partitions, spark.sql.adaptive.enabled, spark.executor.memory, spark.executor.cores. Are these appropriate for the data volume?"
  - step_number: 7
    action: "Search logs for GC or spill warnings"
    sources: ["cloudwatch_logs"]
    log_group: "/emr-on-eks/<env>"
    what_to_look_for: "Full GC events, long pause warnings, or spill-to-disk messages."
  - step_number: 8
    action: "Correlate findings"
    sources: ["shs", "cloudwatch_logs"]
    what_to_look_for: >
      Determine the primary bottleneck: GC pressure, data skew stragglers, insufficient parallelism
      (too few partitions for available cores), excessive shuffle, or spill overhead.
platform_notes:
  - "EMR on EKS defaults spark.sql.shuffle.partitions to 200. For large datasets this may be too low, causing large partitions and spill."
  - "AQE (spark.sql.adaptive.enabled) auto-coalesces partitions and handles skew — if disabled, check if enabling it resolves the issue."
  - "Performance issues don't produce error logs. SHS task and stage metrics are the primary diagnostic signal."
  - "Compare against a known-good run of the same job if available in SHS history."
remediation:
  parallelism:
    - "Increase spark.sql.shuffle.partitions relative to data volume and executor cores"
    - "Enable AQE for automatic partition coalescing"
  gc_pressure:
    - "Increase executor memory to reduce GC frequency"
    - "Consider more executors with less memory each for better GC characteristics"
  spill:
    - "Increase spark.memory.fraction to give more memory to execution"
    - "Increase executor memory to avoid spill"
  stragglers:
    - "Enable speculative execution: spark.speculation=true"
    - "If caused by skew, enable AQE skew join optimization"
tags:
  - performance
  - gc-pressure
  - spill
  - parallelism
  - slow-stages
