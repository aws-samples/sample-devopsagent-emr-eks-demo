scenario_name: emr-eks-pod-scheduling-failure
description: >
  Investigation procedure for Amazon EMR on Amazon EKS job failures caused by
  Kubernetes pod scheduling issues. Driver or executor pods cannot be placed on nodes.
severity: SEVERE
data_sources:
  eks: "Kubernetes pod events, node status, resource quotas in namespace emr-data-team-a"
  cloudwatch_logs: "CloudWatch log group /emr-on-eks/<env> — may be empty if driver never started"
  cloudwatch_metrics: "AWS/EMRContainers namespace — job run state transitions"
  emr_api: "EMR on EKS DescribeJobRun API — failure reason and timeout details"
investigation_steps:
  - step_number: 1
    action: "Get the job run failure details"
    sources: ["emr_api"]
    what_to_look_for: "Does the failure reason mention scheduling, timeout waiting for pods, or resource unavailability?"
  - step_number: 2
    action: "Check pod status in the namespace"
    sources: ["eks"]
    what_to_look_for: "Are there pods in Pending state? Which pods — driver, executors, or both?"
  - step_number: 3
    action: "Check pod events for scheduling failures"
    sources: ["eks"]
    what_to_look_for: "FailedScheduling events — what specific resource is insufficient (cpu, memory, gpu)? Are there affinity or taint issues?"
  - step_number: 4
    action: "Check namespace resource quotas"
    sources: ["eks"]
    what_to_look_for: "Is the namespace at quota limits for cpu, memory, or pod count? Compare used vs hard limits."
  - step_number: 5
    action: "Check node availability and capacity"
    sources: ["eks"]
    what_to_look_for: "How many nodes exist? Are they near capacity? Are all nodes in Ready condition?"
  - step_number: 6
    action: "Check autoscaler or Karpenter status"
    sources: ["eks"]
    what_to_look_for: "Is Karpenter provisioning new nodes? Are there provisioner errors or instance type availability issues? Check for recent NodeClaim activity."
  - step_number: 7
    action: "Correlate findings"
    sources: ["eks", "emr_api"]
    what_to_look_for: >
      Determine the scheduling bottleneck: insufficient cluster capacity, quota limits,
      affinity/taint mismatch, or autoscaler lag.
platform_notes:
  - "EMR on EKS has a job start timeout. If the driver pod isn't running within this window, the job fails."
  - "Karpenter provisioning can take 1-3 minutes for new nodes. Jobs requesting large executors may timeout waiting."
  - "If only executor pods are pending (driver is running), the job may run with reduced parallelism rather than failing immediately."
  - "Scheduling failures produce no Spark event logs and minimal CloudWatch logs. EKS pod events are the primary signal."
remediation:
  capacity:
    - "Increase Karpenter provisioner limits or node group max size"
    - "Add additional instance types to Karpenter provisioner for better availability"
  quota:
    - "Increase namespace ResourceQuota for cpu, memory, or pods"
  configuration:
    - "Reduce executor resource requests to fit more pods per node"
    - "Fix node affinity rules or add matching labels to nodes"
    - "Add tolerations to Spark pod templates for tainted nodes"
tags:
  - scheduling
  - kubernetes
  - resource-quota
  - node-affinity
  - autoscaler
  - capacity
