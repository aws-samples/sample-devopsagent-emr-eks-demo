scenario_name: spark-oom-failure
description: >
  Investigation procedure for Spark job memory failures on EMR on EKS.
  Use when a job fails with exit code 137, OOMKilled, or memory-related exceptions.
severity: SEVERE
data_sources:
  shs: "Spark History Server MCP — job execution details, stage metrics, executor status, task metrics"
  cloudwatch_logs: "CloudWatch log group /emr-on-eks/<env> — driver and executor stdout/stderr, Spark application logs"
  eks: "Kubernetes pod status, events, restart counts, termination reasons in namespaces emr-data-team-a"
  cloudwatch_metrics: "AWS/EMRContainers namespace — job run state transitions, container counts"
investigation_steps:
  - step_number: 1
    action: "Identify the failed job and application"
    sources: ["cloudwatch_metrics", "shs"]
    shs_tool: "get_application_list"
    what_to_look_for: "Find the failed app by name or time window. Note the application ID and failure time."
  - step_number: 2
    action: "Check Spark memory configuration"
    sources: ["shs"]
    shs_tool: "get_application_environment"
    what_to_look_for: "spark.executor.memory, spark.executor.memoryOverhead, spark.driver.memory, spark.executor.instances, spark.sql.adaptive.enabled"
  - step_number: 3
    action: "Check executor status and lifecycle"
    sources: ["shs"]
    shs_tool: "get_executor_list"
    what_to_look_for: "How many executors exist vs configured? Are any removed/dead? Note removal timestamps and reasons."
  - step_number: 4
    action: "Check Kubernetes pod events for memory termination signals"
    sources: ["eks"]
    what_to_look_for: "Pod events showing OOMKilled, exit code 137, eviction, or container termination. Which pods were affected — driver or executor?"
  - step_number: 5
    action: "Search application logs for error patterns"
    sources: ["cloudwatch_logs"]
    log_group: "/emr-on-eks/<env>"
    what_to_look_for: "Search for OutOfMemoryError, exit code 137, GC overhead, or container killed messages. Note which component logged it and the timestamp."
  - step_number: 6
    action: "Locate the failing stage"
    sources: ["shs"]
    shs_tool: "get_stage_list"
    what_to_look_for: "Stages with status FAILED or those active at the time executors/pods were terminated."
  - step_number: 7
    action: "Examine stage metrics for memory pressure signals"
    sources: ["shs"]
    shs_tool: "get_stage_details"
    what_to_look_for: "inputBytes vs outputBytes ratio, shuffleReadBytes, memoryBytesSpilled, diskBytesSpilled. Spill indicates memory pressure. Large output-to-input ratio indicates data amplification."
  - step_number: 8
    action: "Analyze task-level distribution in the failed stage"
    sources: ["shs"]
    shs_tool: "get_stage_task_list"
    what_to_look_for: "Compare max vs median inputSize and duration across tasks. High variance suggests uneven data distribution."
  - step_number: 9
    action: "Correlate findings across sources"
    sources: ["shs", "cloudwatch_logs", "eks"]
    what_to_look_for: >
      Combine evidence: Do pod termination times match executor removal in SHS?
      Do log error timestamps align with the failed stage?
      Does the stage I/O profile explain why memory was exhausted?
      Determine what operation caused memory exhaustion and why.
platform_notes:
  - "EMR on EKS runs Spark inside Kubernetes pods. The total pod memory limit equals spark.executor.memory + spark.executor.memoryOverhead."
  - "Exit code 137 indicates the container was terminated by the OS for exceeding its memory limit."
  - "SHS event logs may be incomplete if the process was killed abruptly — missing executor entries means the process did not shut down cleanly."
  - "Adaptive Query Execution (AQE) must be explicitly enabled on EMR. Check spark.sql.adaptive.enabled in the environment config."
  - "CloudWatch log streams are prefixed by the job name. Use the job name from Step 1 to filter."
remediation:
  increase_memory:
    - "Increase spark.executor.memory or spark.driver.memory"
    - "Increase spark.executor.memoryOverhead for off-heap intensive workloads"
  reduce_partition_size:
    - "Increase spark.sql.shuffle.partitions to reduce per-partition data volume"
    - "Enable AQE for automatic partition coalescing and skew handling"
  code_fix:
    - "Review the query plan for unintended data amplification"
    - "Avoid pulling large result sets to the driver"
tags:
  - memory
  - oom
  - executor
  - driver
  - kubernetes
