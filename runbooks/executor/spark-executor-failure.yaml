scenario_name: spark-executor-failure
description: >
  Investigation procedure for Spark job failures due to lost executors, heartbeat
  timeouts, or repeated executor terminations.
severity: SEVERE
data_sources:
  shs: "Spark History Server MCP — executor lifecycle, removal reasons, stage progress"
  cloudwatch_logs: "CloudWatch log group /emr-on-eks/<env> — executor heartbeat and loss messages"
  eks: "Kubernetes pod events, evictions, node conditions in namespace emr-data-team-a"
  cloudwatch_metrics: "AWS/EMRContainers namespace — job run state, container metrics"
investigation_steps:
  - step_number: 1
    action: "Identify the failed application"
    sources: ["shs"]
    shs_tool: "get_application_list"
    what_to_look_for: "Find the failed app. Note application ID and failure time."
  - step_number: 2
    action: "Examine executor lifecycle"
    sources: ["shs"]
    shs_tool: "get_executor_list"
    what_to_look_for: "Which executors were removed? What are their removal reasons and timestamps? Are removals concentrated in time or spread out?"
  - step_number: 3
    action: "Check what stage was running when executors died"
    sources: ["shs"]
    shs_tool: "get_stage_list"
    what_to_look_for: "Which stage was active at the executor removal timestamps? Was it a shuffle-heavy or memory-intensive stage?"
  - step_number: 4
    action: "Search logs for executor loss details"
    sources: ["cloudwatch_logs"]
    log_group: "/emr-on-eks/<env>"
    what_to_look_for: "Messages about executor lost, heartbeat timeout, or task failures. Note the time gap between last heartbeat and declaration of loss."
  - step_number: 5
    action: "Check Kubernetes pod events"
    sources: ["eks"]
    what_to_look_for: "Pod termination reasons — was it OOMKilled, evicted due to node pressure, preempted, or terminated by Karpenter/spot interruption?"
  - step_number: 6
    action: "Check if failures are node-concentrated"
    sources: ["eks"]
    what_to_look_for: "Are failed pods on the same node? If yes, check node conditions (memory pressure, disk pressure, NotReady)."
  - step_number: 7
    action: "Check executor resource usage before death"
    sources: ["shs"]
    shs_tool: "get_stage_details"
    what_to_look_for: "Was there heavy spill or shuffle activity in the active stage? High memory pressure could trigger GC pauses that exceed heartbeat timeout."
  - step_number: 8
    action: "Correlate findings"
    sources: ["shs", "cloudwatch_logs", "eks"]
    what_to_look_for: >
      Match pod termination events with SHS executor removal times.
      Determine if the cause is resource exhaustion, infrastructure (node/spot), or network.
platform_notes:
  - "Default heartbeat timeout is 120s. Long GC pauses can exceed this, causing the driver to mark executors as lost even though they're still running."
  - "Karpenter consolidation or spot interruption terminates nodes with 30s notice. Executor pods on those nodes are lost."
  - "EMR on EKS executor pods don't have pod disruption budgets by default. Node drains will terminate them immediately."
  - "If dynamic allocation is enabled, removed executors may be intentional (idle timeout) not failures. Check the removal reason."
remediation:
  heartbeat_tuning:
    - "Increase spark.network.timeout and spark.executor.heartbeatInterval"
    - "Increase spark.task.maxFailures and spark.stage.maxConsecutiveAttempts"
  resource_allocation:
    - "Increase executor memory to reduce GC pressure"
    - "Use dedicated node groups with on-demand instances for critical jobs"
  infrastructure:
    - "Add pod disruption budgets for executor pods"
    - "Configure Karpenter do-not-disrupt annotations for long-running jobs"
tags:
  - executor
  - heartbeat
  - timeout
  - kubernetes
  - pod-eviction
